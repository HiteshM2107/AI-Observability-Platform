version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: logs
    ports:
      - "5432:5432"

  ingestion-service:
    build: ./services/ingestion-service
    ports:
      - "8001:8000"
    depends_on:
      - redis

  processor-service:
    build: ./services/processor-service
    depends_on:
      - redis
      - postgres
      - ai-service

  ai-service:
    build: ./services/ai-service
    ports:
      - "8004:8000"

  auth-service:
    build: ./services/auth-service
    depends_on:
      - ingestion-service

  payment-service:
    build: ./services/payment-service
    depends_on:
      - ingestion-service